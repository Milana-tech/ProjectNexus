version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1) React Frontend
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "3000:3000"
    volumes:
      # Mount the local codebase over the container's app directory for hot-reloading
      - ./frontend:/app
      # Create an anonymous volume for node_modules so local node_modules don't overwrite container's
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # These variables ensure fast refresh and file polling work gracefully in Docker
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - HOST=0.0.0.0
    restart: unless-stopped
    depends_on:
      - php-backend
      - python-backend

  # ----------------------------------------------------------------------------
  # 2) PHP Symfony Backend (Placeholder)
  # ----------------------------------------------------------------------------
  php-backend:
    # Later replace this with your build context and Dockerfile
    image: php:8.2-fpm-alpine
    container_name: nexus-php-backend
    ports:
      # Map to port 8000 on the host
      - "8000:8000"
    # volumes:
    #   - ./backend-php:/var/www/html
    environment:
      # Sample DB connection string
      - DATABASE_URL=postgres://nexususer:nexuspass@timescaledb:5432/nexusdb
    depends_on:
      - timescaledb
    # Keeping the container alive by simply starting the built-in server or sleeping
    command: ["php", "-S", "0.0.0.0:8000", "-t", "/var/www/html"]
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 3) Python FastAPI Backend (Placeholder)
  # ----------------------------------------------------------------------------
  python-backend:
    # Later replace this with your build context and Dockerfile
    image: python:3.11-slim
    container_name: nexus-python-backend
    ports:
      # Map to port 8001 on the host
      - "8001:8000"
    # volumes:
    #   - ./backend-python:/app
    environment:
      - DATABASE_URL=postgresql://nexususer:nexuspass@timescaledb:5432/nexusdb
    depends_on:
      - timescaledb
    # working_dir: /app
    # Just running a basic HTTP server to keep the placeholder alive
    command: ["python", "-m", "http.server", "8000"]
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 4) TimescaleDB (PostgreSQL Extension)
  # ----------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: nexus-timescaledb
    environment:
      - POSTGRES_USER=nexususer
      - POSTGRES_PASSWORD=nexuspass
      - POSTGRES_DB=nexusdb
    ports:
      - "5432:5432"
    volumes:
      # Persistent data storage for the database
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  timescaledb-data:
