name: project-nexus

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: project-nexus-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: project-nexus-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-nexus-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  php-backend:
    image: php:8.2-fpm-alpine
    container_name: nexus-php-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    command: ["php", "-S", "0.0.0.0:8001", "-t", "/var/www/html"]
    restart: unless-stopped

volumes:
  timescaledb_data:
