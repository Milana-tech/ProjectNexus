name: project-nexus

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: project-nexus-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: project-nexus-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    ports:
      - "8000:8000"

  backend_php:
    build:
      context: ./backend-php
    container_name: project-nexus-backend-php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
    depends_on:
      - db
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-nexus-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  simulator:
    build:
      context: ./simulator
    container_name: project-nexus-simulator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SIM_ZONE_NAME: ${SIM_ZONE_NAME:-Zone 1}
      SIM_DEVICE_NAME: ${SIM_DEVICE_NAME:-Greenhouse A}
      SIM_DEVICE_TYPE: ${SIM_DEVICE_TYPE:-greenhouse}
      SIM_METRICS: ${SIM_METRICS:-temperature,humidity}
      SIM_INTERVAL_SECONDS: ${SIM_INTERVAL_SECONDS:-5}
      SIM_SPIKE_EVERY: ${SIM_SPIKE_EVERY:-20}
    depends_on:
      - db

volumes:
  timescaledb_data:
